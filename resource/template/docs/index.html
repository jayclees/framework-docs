{% extends "layout/app.html" %}
{% block head %}
<title>{{ seo_title }}</title>
<meta name="description" content="{{ seo_description }}">
{% endblock %}
{% block content %}
<div class="container py-5">
    <h1>Documentation</h1>
    <p>{{ seo_description }}</p>
    <hr>
    <div class="row">
        {% for key, value in doc_pages %}
        <div class="col-md-4">
            <a href="/docs/{{ key }}" class="card mb-4 bg-dark-subtle text-decoration-none">
                <div class="card-body py-5 text-center">
                    <h4 class="my-3">{{ value.title }}</h4>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
