{% extends "layout/app.html" %}
{% block head %}
<title>{{ title }}</title>
<meta name="description" content="{{ description }}">
{% endblock %}
{% block content %}
<div class="container">
    <div class="row">
        <aside class="col-lg-3">
            <div class="sticky-top top-0 p-3">
                <h4>Table of Contents:</h4>
                <ul>
                    {% for key, value in doc_pages %}
                    <li><a href="/docs/{{ key }}">{{ value.title }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </aside>
        <main class="col-lg-9">
            <div class="container py-lg-5">
                {{ content|safe }}
            </div>
        </main>
    </div>
</div>
{% endblock %}
