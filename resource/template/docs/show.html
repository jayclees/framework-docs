{% extends "layout/app.html" %}
{% block head %}
<title>{{ title }}</title>
<meta name="description" content="{{ description }}">
{% endblock %}
{% block content %}
<div class="container pb-5 mb-5">
    <div class="row">
        <aside class="col-lg-3">
            <div class="sticky-top top-0 px-3 py-5">
                <h4>Table of Contents:</h4>
                <ul>
                    {% for key, value in doc_pages|dictsort %}
                    <li><a href="/docs/{{ key }}">{{ value.title }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </aside>
        <main class="col-lg-9">
            <article class="py-lg-5">
                {{ content|safe }}
            </article>
        </main>
    </div>
</div>
{% endblock %}
